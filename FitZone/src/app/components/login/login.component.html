<link
  href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap"
  rel="stylesheet"
/>
  <div class="body">
    <img src="assets/images/login6.jpg" alt="" class="background-image">
      <header>
        <a href="/home"><img src="assets/images/logoFZ.png" alt="Logo RubenGym"></a>
        <h1>Ruben<span style="color: blueviolet; font-weight: bold;">Gym</span></h1>
      </header>

      <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form (submit)="login()">
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" [(ngModel)]="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input
              type="password"
              id="contraseña"
              [(ngModel)]="contrasena"
              name="contraseña"
              required
            />
          </div>
          <div class="btn-container">
            <button type="submit" class="btn">Iniciar Sesión</button>
            <a href="/register">Registrarse</a>
        </div>

        </form>
      </div>

      <footer class="footer">
        <p>&copy; 2025 RUBENGYM - Todos los derechos reservados.</p>
      </footer>
  </div>
